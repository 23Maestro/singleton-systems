<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Source Map Flow Playground</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1020;
      --panel: #121a2d;
      --panel-2: #172033;
      --line: #2a3652;
      --text: #f4f7fb;
      --muted: #aab5c8;
      --soft: #d8deea;
      --blue: #2f80ed;
      --violet: #6655d9;
      --green: #22b877;
      --orange: #f97316;
      --amber: #f2a900;
      --red: #ef4444;
      --shadow: 0 18px 50px rgba(0, 0, 0, .22);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    main[data-playground] {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(260px, 340px) minmax(0, 1fr);
      grid-template-rows: minmax(0, 1fr) auto;
      gap: 14px;
      padding: 14px;
    }

    section {
      border: 1px solid rgba(255, 255, 255, .09);
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.015)), var(--panel);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    [data-controls-panel] {
      padding: 16px;
      overflow: auto;
    }

    [data-preview-panel] {
      overflow: auto;
      padding: 16px;
    }

    [data-prompt-panel] {
      grid-column: 1 / -1;
      padding: 14px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: start;
    }

    h1, h2, h3, p {
      margin: 0;
    }

    h1 {
      font-size: 18px;
      line-height: 1.2;
    }

    h2 {
      margin-top: 18px;
      margin-bottom: 8px;
      color: var(--soft);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .12em;
    }

    .lede {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .preset-row,
    .segmented,
    .check-list {
      display: grid;
      gap: 8px;
    }

    button,
    select,
    input[type="range"] {
      width: 100%;
      min-height: 36px;
      border: 1px solid rgba(255, 255, 255, .12);
      background: #0f1728;
      color: var(--text);
      border-radius: 8px;
      font: inherit;
    }

    button {
      cursor: pointer;
      padding: 9px 11px;
      text-align: left;
    }

    button[data-active="true"] {
      border-color: rgba(47, 128, 237, .75);
      background: rgba(47, 128, 237, .18);
    }

    select {
      padding: 8px 10px;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--soft);
      font-size: 13px;
    }

    .toggle {
      grid-template-columns: auto minmax(0, 1fr);
      align-items: center;
      gap: 8px;
      color: var(--muted);
    }

    .toggle input {
      width: 16px;
      height: 16px;
    }

    .range-row {
      display: grid;
      gap: 7px;
    }

    .range-meta {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 12px;
    }

    .preview-wrap {
      min-width: 0;
      display: grid;
      justify-content: center;
      align-items: start;
    }

    .preview-iframe {
      width: 100%;
      max-width: 1200px;
      min-height: 520px;
      aspect-ratio: 1200 / 760;
      border: 0;
      border-radius: 8px;
      background: #f8fafc;
    }

    .export-frame {
      width: 1200px;
      aspect-ratio: 1200 / 760;
      background: #f8fafc;
      color: #111827;
      border-radius: 32px;
      border: 1px solid #dce2eb;
      box-shadow: 0 26px 80px rgba(0, 0, 0, .34);
      position: relative;
      overflow: hidden;
    }

    .export-frame[data-frame="topbar"]::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 118px;
      background: #111827;
      z-index: 0;
    }

    .map-card {
      position: absolute;
      inset: 78px 48px 42px;
      border: 1px solid #dfe5ee;
      background: rgba(255, 255, 255, .92);
      border-radius: 18px;
      padding: 40px 48px;
      box-shadow: 0 10px 35px rgba(15, 23, 42, .09);
      z-index: 1;
    }

    .export-frame[data-frame="clean"] .map-card {
      inset: 42px 44px;
    }

    .map-kicker {
      color: #687386;
      font-size: 13px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: .18em;
      text-transform: uppercase;
    }

    .map-title {
      margin-top: 12px;
      max-width: 740px;
      color: #0f172a;
      font-size: 33px;
      line-height: 1.08;
      font-weight: 850;
    }

    .map-subtitle {
      margin-top: 12px;
      color: #526071;
      font-size: 16px;
      line-height: 1.42;
      max-width: 760px;
    }

    .top-label {
      position: absolute;
      top: 26px;
      left: 42px;
      z-index: 2;
      color: #eef4ff;
      font-size: 32px;
      line-height: 1;
      font-weight: 850;
    }

    .route-label {
      position: absolute;
      top: 30px;
      right: 42px;
      z-index: 2;
      color: #c9d4e5;
      font-size: 28px;
      line-height: 1;
      font-weight: 800;
    }

    .diagram {
      position: relative;
      margin-top: 38px;
      height: 380px;
    }

    .node {
      position: absolute;
      min-height: 116px;
      border: 1.5px solid var(--node-color);
      background: var(--node-fill);
      border-radius: 10px;
      padding: 20px 22px 18px;
      box-shadow: 0 12px 26px rgba(15, 23, 42, .07);
      display: grid;
      align-content: start;
      gap: 8px;
    }

    .node .badge {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 9px;
      background: var(--node-color);
      color: #fff;
      font-size: 13px;
      line-height: 1;
      font-weight: 820;
    }

    .node .badge svg {
      width: 21px;
      height: 21px;
      stroke: currentColor;
      stroke-width: 2.1;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .node .node-title {
      color: #101827;
      font-size: 20px;
      line-height: 1.13;
      font-weight: 800;
    }

    .node .node-subtitle {
      color: #5a6678;
      font-size: 13px;
      line-height: 1.32;
      font-weight: 650;
    }

    .node[data-compact="true"] {
      min-height: 100px;
      padding: 18px 20px;
    }

    .node[data-compact="true"] .badge {
      width: 31px;
      height: 31px;
    }

    .node[data-compact="true"] .node-title {
      font-size: 19px;
    }

    .node[data-compact="true"] .node-subtitle {
      font-size: 12px;
    }

    .note-strip {
      position: absolute;
      left: 34px;
      right: 34px;
      bottom: 24px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      color: #667085;
      font-size: 13px;
      line-height: 1.25;
    }

    .note-strip span {
      border: 1px solid #d8dee8;
      background: #fff;
      border-radius: 999px;
      padding: 7px 10px;
      font-weight: 700;
    }

    pre[data-prompt-output] {
      min-height: 82px;
      max-height: 190px;
      margin: 0;
      white-space: pre-wrap;
      overflow: auto;
      color: #dfe7f6;
      font-size: 13px;
      line-height: 1.45;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    [data-copy-prompt] {
      width: 140px;
      text-align: center;
    }

    @media (max-width: 900px) {
      main[data-playground] {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto;
      }

      [data-prompt-panel] {
        grid-column: auto;
        grid-template-columns: 1fr;
      }

      [data-copy-prompt] {
        width: 100%;
      }

      .preview-wrap {
        min-width: 0;
      }
    }
  </style>
</head>
<body>
  <main data-playground data-playground-lane="code-map">
    <section data-controls-panel>
      <h1>Source Map Flow Playground</h1>
      <p class="lede">Two focused C4-style visuals for the portfolio source map: one README route and one bucket map.</p>

      <h2>Presets</h2>
      <div class="preset-row" id="presetRow"></div>

      <h2>Map</h2>
      <label>
        Visual target
        <select data-control="map" id="mapSelect">
          <option value="readme">README route</option>
          <option value="bucket">System bucket map</option>
        </select>
      </label>

      <h2>Detail</h2>
      <div class="check-list">
        <label class="toggle">
          <input data-control="showSubtitle" id="showSubtitle" type="checkbox">
          <span>Show supporting labels</span>
        </label>
        <label class="toggle">
          <input data-control="showNotes" id="showNotes" type="checkbox">
          <span>Show ownership note strip</span>
        </label>
        <label class="toggle">
          <input data-control="topbar" id="topbar" type="checkbox">
          <span>Use verification-route header</span>
        </label>
      </div>

      <h2>Framing</h2>
      <label class="range-row">
        Node scale
        <input data-control="scale" id="scale" type="range" min="88" max="112" step="2">
        <span class="range-meta"><span>compact</span><span id="scaleValue">100%</span><span>large</span></span>
      </label>
    </section>

    <section data-preview-panel>
      <div class="preview-wrap">
        <div data-preview></div>
      </div>
    </section>

    <section data-prompt-panel>
      <pre data-prompt-output></pre>
      <button data-copy-prompt type="button">Copy Prompt</button>
    </section>
  </main>

  <script>
    const defaults = {
      map: "readme",
      showSubtitle: true,
      showNotes: false,
      topbar: true,
      scale: 100
    };

    const state = { ...defaults };

    const presets = [
      { name: "README route", values: { ...defaults, map: "readme", showSubtitle: true, showNotes: false, topbar: true, scale: 100 } },
      { name: "Bucket map", values: { ...defaults, map: "bucket", showSubtitle: true, showNotes: false, topbar: true, scale: 100 } },
      { name: "Clean export", values: { ...defaults, map: "readme", showSubtitle: false, showNotes: false, topbar: false, scale: 104 } },
      { name: "Dense review", values: { ...defaults, map: "bucket", showSubtitle: true, showNotes: true, topbar: false, scale: 92 } }
    ];

    const maps = {
      readme: {
        kicker: "C4 README MAP",
        title: "Prospect ID Workflow Route",
        subtitle: "Command UI, legacy-system adapter work, source-of-truth cleanup, and audit tests for a practical operations workflow.",
        notes: ["Commands are buttons", "FastAPI bridges legacy dashboard behavior", "Supabase owns durable facts"],
        nodes: [
          { id: "operator", badge: "1", title: "Operator", subtitle: "Triggers workflow action", x: 0, y: 28, w: 214, color: "blue" },
          { id: "bridge", badge: "3", title: "Local FastAPI Bridge", subtitle: "Adapter layer", x: 400, y: 28, w: 240, color: "orange" },
          { id: "legacy", badge: "4", title: "Legacy Laravel", subtitle: "Dashboard behavior", x: 802, y: 28, w: 220, color: "red" },
          { id: "raycast", badge: "2", title: "Raycast Commands", subtitle: "Command UI", x: 178, y: 252, w: 230, color: "violet" },
          { id: "web", badge: "6", title: "Prospect Web", subtitle: "Clean review surface", x: 520, y: 252, w: 230, color: "blue" },
          { id: "truth", badge: "5", title: "Supabase PostgreSQL", subtitle: "Durable facts", x: 802, y: 252, w: 220, color: "green" }
        ]
      },
      bucket: {
        kicker: "C4 BUCKET MAP",
        title: "Scouting Coordinator System Map",
        subtitle: "Buckets show where workflow meaning lives before code or cleanup changes are made.",
        notes: ["Buckets own meaning", "Support caches are not lifecycle truth", "Outcomes close the loop"],
        nodes: [
          { id: "meetings", icon: "calendar", title: "Meetings", subtitle: "& Scheduling", x: 0, y: 20, w: 232, color: "blue" },
          { id: "pre", icon: "clipboard", title: "Pre-Meeting", subtitle: "Work", x: 402, y: 20, w: 232, color: "violet" },
          { id: "client", icon: "chat", title: "Client", subtitle: "Communication", x: 804, y: 20, w: 232, color: "green" },
          { id: "outcomes", icon: "trophy", title: "Outcomes", subtitle: "& Enrollments", x: 0, y: 256, w: 232, color: "amber" },
          { id: "life", icon: "chart", title: "Lifecycle", subtitle: "& Reporting", x: 402, y: 256, w: 232, color: "green" },
          { id: "coordinator", icon: "command", title: "Scouting Coordinator", subtitle: "Command center", x: 746, y: 256, w: 290, color: "orange" }
        ]
      }
    };

    const icons = {
      calendar: '<svg viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="15" rx="2"></rect><path d="M8 3v4M16 3v4M4 10h16"></path></svg>',
      clipboard: '<svg viewBox="0 0 24 24"><path d="M9 4h6l1 2h3v15H5V6h3l1-2z"></path><path d="M9 13l2 2 4-5"></path></svg>',
      chat: '<svg viewBox="0 0 24 24"><path d="M5 6h14v9H8l-3 3V6z"></path><path d="M9 10h6M9 13h4"></path></svg>',
      chart: '<svg viewBox="0 0 24 24"><path d="M5 19V5M11 19V9M17 19V3"></path><path d="M3 19h18"></path></svg>',
      trophy: '<svg viewBox="0 0 24 24"><path d="M8 4h8v5a4 4 0 0 1-8 0V4z"></path><path d="M8 6H5a3 3 0 0 0 3 5M16 6h3a3 3 0 0 1-3 5M12 13v4M9 21h6M10 17h4"></path></svg>',
      command: '<svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"></path><circle cx="12" cy="12" r="7"></circle></svg>'
    };

    const palette = {
      blue: ["#2f80ed", "#ffffff"],
      violet: ["#6655d9", "#ffffff"],
      green: ["#22b877", "#ffffff"],
      orange: ["#f97316", "#ffffff"],
      amber: ["#f2a900", "#ffffff"],
      red: ["#ef4444", "#ffffff"]
    };

    const controls = {
      map: document.getElementById("mapSelect"),
      showSubtitle: document.getElementById("showSubtitle"),
      showNotes: document.getElementById("showNotes"),
      topbar: document.getElementById("topbar"),
      scale: document.getElementById("scale")
    };

    const presetRow = document.getElementById("presetRow");
    const preview = document.querySelector("[data-preview]");
    const promptOutput = document.querySelector("[data-prompt-output]");
    const copyButton = document.querySelector("[data-copy-prompt]");
    const scaleValue = document.getElementById("scaleValue");

    function applyPreset(index) {
      Object.assign(state, presets[index].values);
      updateAll();
    }

    function renderControls() {
      presetRow.innerHTML = presets.map((preset, index) => {
        const active = Object.entries(preset.values).every(([key, value]) => state[key] === value);
        return `<button type="button" data-preset="${preset.name.toLowerCase().replaceAll(" ", "-")}" data-index="${index}" data-active="${active}">${preset.name}</button>`;
      }).join("");

      controls.map.value = state.map;
      controls.showSubtitle.checked = state.showSubtitle;
      controls.showNotes.checked = state.showNotes;
      controls.topbar.checked = state.topbar;
      controls.scale.value = String(state.scale);
      scaleValue.textContent = `${state.scale}%`;

      presetRow.querySelectorAll("[data-preset]").forEach((button) => {
        button.addEventListener("click", () => applyPreset(Number(button.dataset.index)));
      });
    }

    function renderPreview() {
      const map = maps[state.map];
      const scale = state.scale / 100;
      const compact = state.scale < 96;
      const frame = state.topbar ? "topbar" : "clean";
      const topbar = state.topbar
        ? `<div class="top-label">Prospect ID Workflow System</div><div class="route-label">Verification route</div>`
        : "";

      const nodes = map.nodes.map((node) => {
        const [color, fill] = palette[node.color];
        const subtitle = state.showSubtitle ? `<div class="node-subtitle">${node.subtitle}</div>` : "";
        const badge = icons[node.icon] ?? node.badge;
        return `<div class="node" data-compact="${compact}" style="--node-color:${color}; --node-fill:${fill}; left:${node.x}px; top:${node.y}px; width:${node.w}px; transform:scale(${scale}); transform-origin:center;">
          <div class="badge">${badge}</div>
          <div class="node-title">${node.title}</div>
          ${subtitle}
        </div>`;
      }).join("");

      const notes = state.showNotes
        ? `<div class="note-strip">${map.notes.map((note) => `<span>${note}</span>`).join("")}</div>`
        : "";

      const artifact = `
        <div class="export-frame" data-frame="${frame}">
          ${topbar}
          <div class="map-card">
            <div class="map-kicker">${map.kicker}</div>
            <div class="map-title">${map.title}</div>
            ${state.showSubtitle ? `<p class="map-subtitle">${map.subtitle}</p>` : ""}
            <div class="diagram">
              ${nodes}
            </div>
            ${notes}
          </div>
        </div>`;

      const frameDoc = `<!doctype html>
        <html lang="en">
        <head>
          <meta charset="utf-8">
          <style>
            :root { color-scheme: light; }
            * { box-sizing: border-box; }
            html, body { margin: 0; width: 100%; min-height: 100%; background: #f8fafc; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
            .export-frame { width: 1200px; height: 760px; background: #f8fafc; color: #111827; border-radius: 32px; border: 0; position: relative; overflow: hidden; transform-origin: top left; }
            .export-frame[data-frame="topbar"]::before { content: ""; position: absolute; inset: 0 0 auto; height: 118px; background: #111827; z-index: 0; }
            .map-card { position: absolute; inset: 78px 48px 42px; border: 1px solid #dfe5ee; background: rgba(255,255,255,.94); border-radius: 18px; padding: 40px 48px; box-shadow: 0 10px 35px rgba(15,23,42,.09); z-index: 1; }
            .export-frame[data-frame="clean"] .map-card { inset: 42px 44px; }
            .map-kicker { color: #687386; font-size: 13px; line-height: 1; font-weight: 800; letter-spacing: .18em; text-transform: uppercase; }
            .map-title { margin-top: 12px; max-width: 740px; color: #0f172a; font-size: 33px; line-height: 1.08; font-weight: 850; }
            .map-subtitle { margin-top: 12px; color: #526071; font-size: 16px; line-height: 1.42; max-width: 760px; }
            .top-label { position: absolute; top: 26px; left: 42px; z-index: 2; color: #eef4ff; font-size: 32px; line-height: 1; font-weight: 850; }
            .route-label { position: absolute; top: 30px; right: 42px; z-index: 2; color: #c9d4e5; font-size: 28px; line-height: 1; font-weight: 800; }
            .diagram { position: relative; margin-top: 38px; height: 380px; }
            .node { position: absolute; min-height: 116px; border: 1.5px solid var(--node-color); background: var(--node-fill); border-radius: 10px; padding: 20px 22px 18px; box-shadow: 0 12px 26px rgba(15,23,42,.07); display: grid; align-content: start; gap: 8px; }
            .node .badge { width: 34px; height: 34px; display: grid; place-items: center; border-radius: 9px; background: var(--node-color); color: #fff; font-size: 13px; line-height: 1; font-weight: 820; }
            .node .badge svg { width: 21px; height: 21px; stroke: currentColor; stroke-width: 2.1; stroke-linecap: round; stroke-linejoin: round; fill: none; }
            .node .node-title { color: #101827; font-size: 20px; line-height: 1.13; font-weight: 800; }
            .node .node-subtitle { color: #5a6678; font-size: 13px; line-height: 1.32; font-weight: 650; }
            .node[data-compact="true"] { min-height: 100px; padding: 18px 20px; }
            .node[data-compact="true"] .badge { width: 31px; height: 31px; }
            .node[data-compact="true"] .node-title { font-size: 19px; }
            .node[data-compact="true"] .node-subtitle { font-size: 12px; }
            .note-strip { position: absolute; left: 34px; right: 34px; bottom: 24px; display: flex; gap: 10px; flex-wrap: wrap; color: #667085; font-size: 13px; line-height: 1.25; }
            .note-strip span { border: 1px solid #d8dee8; background: #fff; border-radius: 999px; padding: 7px 10px; font-weight: 700; }
            @media (max-width: 1199px) {
              .export-frame { transform: scale(calc(100vw / 1200)); }
              body { height: calc(760px * (100vw / 1200)); overflow: hidden; }
            }
          </style>
        </head>
        <body>${artifact}</body>
        </html>`;

      preview.innerHTML = `<iframe class="preview-iframe" title="${map.title} preview"></iframe>`;
      preview.querySelector("iframe").srcdoc = frameDoc;
    }

    function updatePrompt() {
      const map = maps[state.map];
      const choices = [];
      choices.push(state.map === "readme" ? "use the README route flow" : "use the Scouting Coordinator bucket map");
      if (!state.showSubtitle) choices.push("remove supporting labels for a cleaner export");
      if (!state.showNotes) choices.push("hide the ownership note strip");
      if (!state.topbar) choices.push("remove the verification-route header");
      if (state.scale !== defaults.scale) choices.push(`set node scale to ${state.scale}%`);

      promptOutput.textContent = `Create a focused 1200x760 C4-style node flow for ${map.title}. Preserve the exact source wording from docs/visual-maps/ai-workflow-portfolio.c4 and the portfolio source-map contract. Direction: ${choices.join(", ")}. Keep it readable as a README or portfolio image, with large node titles, restrained labels, and no crowded architecture inventory.`;
    }

    function updateAll() {
      renderControls();
      renderPreview();
      updatePrompt();
    }

    function writeControl(name, value) {
      state[name] = value;
      updateAll();
    }

    controls.map.addEventListener("change", (event) => writeControl("map", event.target.value));
    controls.showSubtitle.addEventListener("change", (event) => writeControl("showSubtitle", event.target.checked));
    controls.showNotes.addEventListener("change", (event) => writeControl("showNotes", event.target.checked));
    controls.topbar.addEventListener("change", (event) => writeControl("topbar", event.target.checked));
    controls.scale.addEventListener("input", (event) => writeControl("scale", Number(event.target.value)));

    copyButton.addEventListener("click", async () => {
      const text = promptOutput.textContent.trim();
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const area = document.createElement("textarea");
        area.value = text;
        document.body.appendChild(area);
        area.select();
        document.execCommand("copy");
        area.remove();
      }
      copyButton.dataset.copied = "true";
      copyButton.textContent = "Copied";
      setTimeout(() => {
        copyButton.dataset.copied = "false";
        copyButton.textContent = "Copy Prompt";
      }, 1200);
    });

    updateAll();
  </script>
</body>
</html>
